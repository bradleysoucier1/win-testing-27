<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notepad</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="desktop">
      <section class="notepad-window" aria-label="Windows 10 style notepad window">
        <header class="title-bar">
          <div class="title-left">
            <span class="notepad-icon" aria-hidden="true">🗒️</span>
            <h1>Untitled - Notepad</h1>
          </div>
          <div class="window-controls" aria-hidden="true">
            <button type="button" class="control">—</button>
            <button type="button" class="control">▢</button>
            <button type="button" class="control close">✕</button>
          </div>
        </header>

        <nav class="menu-bar" aria-label="Menu">
          <button type="button">File</button>
          <button type="button">Edit</button>
          <button type="button">Format</button>
          <button type="button">View</button>
          <button type="button">Help</button>
        </nav>

        <label class="sr-only" for="editor">Notepad text editor</label>
        <textarea id="editor" spellcheck="false" autofocus>Windows 10 styled notepad.

Type your notes here...</textarea>

        <footer class="status-bar">
          <span id="line-col">Ln 1, Col 1</span>
          <span id="encoding">UTF-8</span>
          <span id="zoom">100%</span>
          <span id="eol">Windows (CRLF)</span>
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
